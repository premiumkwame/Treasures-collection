<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections – Treasures Collection</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="productstyle.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="shop-page">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <a href="index.html" style="display:flex;align-items:center;gap:10px;">
          <span class="logo-icon">✦</span>
          <span class="logo-text">Treasures Collection</span>
        </a>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html" class="active-link">Collections</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== BANNER ===== -->
  <div class="shop-banner">
    <div class="shop-banner-inner">
      <div class="banner-eyebrow-row">
        <a href="index.html" class="banner-back-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </a>
        <p class="section-eyebrow">The Full Range</p>
        <span class="banner-eyebrow-spacer"></span>
      </div>
      <h1 class="shop-banner-title">Collections</h1>
      <p class="shop-banner-sub">Discover every treasure — from timeless classics to contemporary statements.</p>
    </div>
  </div>

  <!-- ===== COLLECTIONS ===== -->
  <section class="collections-section" id="collections">

    <div class="collections-top-bar">
      <button class="shop-view-all-btn" id="showAllBtn">View All ✦</button>
    </div>

    <div class="circles-scroll-wrapper">
      <div class="collection-circles" id="collectionCircles">

        <!-- EARPIECES -->
        <div class="circle-item" data-collection="earpieces"
          data-products='[
            {"id":1,"name":"EarCuff Earrings","material":"18K Gold · Diamond","price":380,"badge":"Bestseller","src":"images/earcuffearring.jpg","weight":"4.2g"},
            {"id":2,"name":"Lobe Earrings","material":"14K Gold · Diamond","price":620,"badge":"New","src":"images/lobe.jpg","weight":"3.8g"},
            {"id":3,"name":"Targus Earrings","material":"22K Gold · Diamond","price":245,"badge":null,"src":"images/targus.jpg","weight":"2.6g"},
            {"id":4,"name":"Industrial Earrings","material":"18K Silver · Gold","price":890,"badge":null,"src":"images/industrial.jpg","weight":"3.1g"},
            {"id":5,"name":"Daith Earrings","material":"18K Gold · Diamond","price":460,"badge":"Limited","src":"images/daith.jpg","weight":"6.5g"}
          ]'>
          <div class="circle-ring">
            <div class="circle-img-wrap">
              <img src="images/earringcollection.png" alt="Earpieces" />
              <div class="circle-overlay"><span>View</span></div>
            </div>
          </div>
          <p class="circle-label">Earpieces</p>
        </div>

        <!-- NECKPIECES -->
        <div class="circle-item" data-collection="neckpieces"
          data-products='[
            {"id":6,"name":"Royal Sapphire Diamond Necklace","material":"18K Gold · VVS Diamond","price":2200,"badge":"Signature","src":"images/royalsapphire.jpg","length":"45cm","weight":"14.8g"},
            {"id":7,"name":"Pearl Necklace","material":"Sea Pearl","price":1350,"badge":"Bestseller","src":"images/pearlnecklace.jpg","length":"50cm","weight":"32g"},
            {"id":8,"name":"Clover Opera Necklace","material":"18K Gold · Colombian Emerald","price":3400,"badge":"New","src":"images/cloveropera.jpg","length":"42cm","weight":"6.2g"},
            {"id":9,"name":"Hollow-Out Metal Choker","material":"14K Gold","price":780,"badge":null,"src":"images/hollowoutmetalchoker.jpg","length":"45cm","weight":"9.1g"},
            {"id":10,"name":"Layered Gold Tone Necklace","material":"18K Rose Gold","price":1650,"badge":"Limited","src":"images/layeredgoldtone.jpg","length":"40cm","weight":"5.4g"}
          ]'>
          <div class="circle-ring">
            <div class="circle-img-wrap">
              <img src="images/necklacecollection.png" alt="Neckpieces" />
              <div class="circle-overlay"><span>View</span></div>
            </div>
          </div>
          <p class="circle-label">Neckpieces</p>
        </div>

        <!-- WRISTPIECES -->
        <div class="circle-item" data-collection="wristpieces"
          data-products='[
            {"id":11,"name":"Stainless Steel Bracelet","material":"18K White Gold · Diamond","price":4800,"badge":"Signature","src":"images/stainless.jpg","length":"18cm","weight":"8.4g"},
            {"id":12,"name":"Hand Chain","material":"18K Gold","price":920,"badge":"Bestseller","src":"images/handchain.jpg","length":"19cm","weight":"12.3g"},
            {"id":13,"name":"Bangle Stack Set","material":"14K Gold","price":540,"badge":"New","src":"images/bangleset.jpg","weight":"18g"},
            {"id":14,"name":"Sapphire Cuff Bracelet","material":"18K Gold · Sapphire","price":2650,"badge":null,"src":"images/sapphirecuff.jpg","weight":"21.5g"},
            {"id":15,"name":"Gold Rope Bracelet","material":"22K Gold","price":680,"badge":null,"src":"images/goldrope.jpg","length":"20cm","weight":"11.7g"}
          ]'>
          <div class="circle-ring">
            <div class="circle-img-wrap">
              <img src="images/braceletcollection.png" alt="Wristpieces" />
              <div class="circle-overlay"><span>View</span></div>
            </div>
          </div>
          <p class="circle-label">Wristpieces</p>
        </div>

        <!-- RINGS -->
        <div class="circle-item" data-collection="rings"
          data-products='[
            {"id":16,"name":"Solitaire Diamond Ring","material":"18K Gold · Diamond","price":3800,"badge":"Bestseller","src":"images/solitairediamond.jpg","weight":"3.8g"},
            {"id":17,"name":"Eternity Band","material":"18K White Gold · Diamond","price":2100,"badge":"New","src":"images/eternityband.jpg","weight":"4.2g"},
            {"id":18,"name":"Ruby Cocktail Ring","material":"18K Gold · Ruby · Diamond","price":2800,"badge":"Signature","src":"images/rubycocktail.jpg","weight":"6.7g"},
            {"id":19,"name":"Twisted Band Ring","material":"14K Rose Gold","price":420,"badge":null,"src":"images/twistedbandring.jpg","weight":"2.8g"},
            {"id":20,"name":"Sapphire Vintage Ring","material":"18K Gold · Sapphire · Diamond","price":3100,"badge":"Limited","src":"images/sapphirevintage.jpg","weight":"5.9g"}
          ]'>
          <div class="circle-ring">
            <div class="circle-img-wrap">
              <img src="images/ringcollection.png" alt="Rings" />
              <div class="circle-overlay"><span>View</span></div>
            </div>
          </div>
          <p class="circle-label">Rings</p>
        </div>

        <!-- ANKLETS -->
        <div class="circle-item" data-collection="anklets"
          data-products='[
            {"id":21,"name":"Figaro Chain Anklet","material":"14K Gold","price":320,"badge":"Bestseller","src":"images/figarolink.jpg","length":"25cm","weight":"3.6g"},
            {"id":22,"name":"Charm Anklet","material":"18K Gold","price":490,"badge":"New","src":"images/charmanklet.jpg","length":"23-26cm","weight":"4.1g"},
            {"id":23,"name":"Diamond Bezel Anklet","material":"18K White Gold · Diamond","price":1100,"badge":"Signature","src":"images/bezel.jpg","length":"24cm","weight":"3.2g"},
            {"id":24,"name":"Layered Strand Anklet","material":"14K Gold","price":275,"badge":null,"src":"images/layeredanklet.jpg","length":"22-27cm","weight":"2.8g"},
            {"id":25,"name":"Pearl Beaded Anklet","material":"14K Gold · Pearl","price":360,"badge":"Limited","src":"images/pearlanklet.jpg","length":"25cm","weight":"5.3g"}
          ]'>
          <div class="circle-ring">
            <div class="circle-img-wrap">
              <img src="images/ankletcollection.png" alt="Anklets" />
              <div class="circle-overlay"><span>View</span></div>
            </div>
          </div>
          <p class="circle-label">Anklets</p>
        </div>

      </div><!-- /collection-circles -->
    </div><!-- /circles-scroll-wrapper -->

    <!-- Products reveal area -->
    <div class="products-reveal" id="productsReveal">
      <div class="reveal-header">
        <h3 class="reveal-title" id="revealTitle"></h3>
        <button class="close-reveal" id="closeReveal">✕ Close</button>
      </div>
      <div class="products-grid shop-grid" id="productsGrid"></div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
